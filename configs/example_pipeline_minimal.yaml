# Minimal Pipeline Configuration Example
# Demonstrates the simplest possible pipeline setup

experiment_name: 'minimal_pipeline_example'
model_type: 'unet'

model:
  base_channels: 32

data:
  tickers: ['AAPL', 'MSFT', 'GOOGL']
  start_date: '2023-01-01'
  end_date: '2023-12-31'
  sequence_length: 64

training:
  batch_size: 16
  epochs: 10
  learning_rate: 1e-3
  timesteps: 100

# Minimal pipeline - uses all defaults
data_pipeline:
  - load_prices: {}      # All params from runtime (tickers, dates)
  - clean_data: {}       # Default strategy='ffill_drop'
  - process_prices: {}   # Uses processor from runtime, fit from runtime
  - create_windows: {}   # Uses sequence_length from config
  - create_dataloader: {} # Uses batch_size from config

tracker: 'console'
